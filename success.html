<html>
<head>
<title>Success</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Times New Roman;
  text-align: center;
  background-color: #f0f0f0;
  margin-top: 100px;
}

p {
  font-size: 50px;
}

.box {
  background: white;
  padding: 30px;
  border-radius: 10px;
  display: inline-block;
}

a {
  text-decoration: none;
  color: white;
  background: green;
  padding: 10px 15px;
  border-radius: 5px;
}

<style>
/* Container */
.container {
  width: 350px;
  margin: 80px auto;   /* center */
  background: rgba(255, 255, 255, 0.9);
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

/* Form inputs */
.container input,
.container select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

.container input[type="submit"] {
  background: #ffd700;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="box">
  <h2>✅ Order Submitted Successfully!</h2>
  <p>Thank you for your order 📚</p>

  <a href="index.html">Go to Home</a>
  <a href="feedback.html">Give Feedback</a>
</div>

</body>
</html>
