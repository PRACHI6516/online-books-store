<html>
<head>  
<title>Online Book Store</title> 

<style>  
body {  
  margin: 0;  
  font-family: Arial, sans-serif;  
  color: black;  
  background: linear-gradient(to right, #F5F5DC);
}  
  
/* Navbar */  
.navbar {  
  background-color: rgba(0,0,0,0.8);  
  padding: 12px 20px;  
  display: flex;  
  align-items: center;  
}  
  
.navbar .logo {  
  font-weight: bold;  
  font-size: 24px;  
  color: #ffd700;  
  margin-right: 30px;  
}  
  
.navbar a {  
  color: white;  
  text-decoration: none;  
  margin: 0 12px;  
  display: flex;  
  align-items: center;  
  transition: 0.3s;
}  
  
.navbar a:hover {  
  color: #ffd700;  
  transform: scale(1.1);
}  

/* Attractive Container */
.container {
  width: 350px;
  margin: 60px auto;
  padding: 25px;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  backdrop-filter: blur(5px);
}

h2 {
  text-align: center;
  color: #333;
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

input:focus, select:focus {
  outline: none;
  border-color: #6BB7D6;
  box-shadow: 0 0 5px #6BB7D6;
}

input[type="radio"] {
  width: auto;
}

input[type="submit"] {
  background: linear-gradient(to right, #ffd700, #e6c200);
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
  transition: 0.3s;
}

input[type="submit"]:hover {
  transform: scale(1.05);
}

</style>  
</head>  

<body> 

<div class="navbar">  
  <div class="logo">📚 Book Store</div>  
  <a href="index.html">🏠Home</a>
  <a href="books.html">📚Books</a>
  <a href="order.html">📝Order</a>
  <a href="contact.html">📞Contact Us</a>
<a href="aboutus.html">👥About Us</a>
  <a href="feedback.html">🗂️Feedback</a>
</div>

<div class="container">
<h2>Book Order Form</h2>

<form action="success.html">

Name:<br>
<input type="text"><br><br>

Email:<br>
<input type="email"><br><br>

Select Book:<br>
<select>
<option>Programming in C</option>
<option>Clean Code</option>
<option>Introduction to Data Science</option>
<option>Data Analytics Using Python</option>
<option>Database System Concepts</option>
<option>Computer Networks</option>
<option>The Pragmatic Programmer</option>
<option>C Programming Absolute Beginner’s Guide</option>
<option>Data Structures and Algorithms in Java</option>
<option>Data Structures and Algorithms in C++</option>
<option>Python Crash Course</option>
<option>Introduction to Algorithms</option>
<option>Software Engineering</option>
<option>Artificial Intelligence: A Modern Approach</option>
<option>Fundamentals of C Language</option>
<option>Fundamentals of Database System</option>
</select>

<br><br>

Quantity:<br>
<input type="number"><br><br>

Payment Method:<br>
<input type="radio" name="pay"> Cash
<input type="radio" name="pay"> Online

<br><br>

<input type="submit" value="Submit">

</form>
</div>

</body>
</html>
